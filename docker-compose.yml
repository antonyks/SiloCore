services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightbase-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - insightbase-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insightbase-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - insightbase-network

  postgres:
    image: postgres:16
    container_name: insightbase-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insightbase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insightbase"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - insightbase-network

networks:
  insightbase-network:
    driver: bridge

volumes:
  pgdata:
